## MANOVA en R


``` r
dependent_vars &lt;- cbind(iris$Sepal.Length, iris$Sepal.Width, iris$Petal.Length, iris$Petal.Width)
independent_var &lt;- iris$Species

manova_model &lt;- manova(dependent_vars ~ independent_var, data = iris)
summary(manova_model)
```

```
##                  Df Pillai approx F num Df den Df    Pr(&gt;F)    
## independent_var   2 1.1919   53.466      8    290 &lt; 2.2e-16 ***
## Residuals       147                                            
## ---
## Signif. codes:  0 '***' 0.001 '**' 0.01 '*' 0.05 '.' 0.1 ' ' 1
```

#### MANOVA en R

En un experimento para inhibir un tumor, se quiere investigar el efecto del sexo (S) y de la temperatura ambiental (T).


``` r
pesos &lt;-c (18.15,16.51, 0.24, 19.15, 19.49, 0.16, 18.68,
      19.50, 0.32, 18.35, 19.81, 0.17, 19.54, 19.84,
      0.20, 20.58, 19.44, 0.22,21.27, 23.30, 0.33, 
      18.87, 22.00, 0.25, 19.57, 22.30, 0.45, 20.66,
      21.08, 0.20, 20.15, 18.95, 0.35, 21.56, 20.34, 
      0.20,20.74, 16.69, 0.31, 20.22, 19.00, 0.18, 
      20.02, 19.26, 0.41, 18.38, 17.92, 0.30, 17.20,
      15.90, 0.28, 20.85, 19.90, 0.17)
y1&lt;-pesos[c(T,F,F)]
y2&lt;-pesos[c(F,T,F)]
y3&lt;-pesos[c(F,F,T)]
temp &lt;-factor(c(rep(4,6),rep(20,6),rep(34,6)))
sex&lt;-factor(rep(c(rep("F",3),rep("M",3)),3))
ratas&lt;-data.frame(y1,y2,y3,temp,sex)
head(ratas)
```

```
##      y1    y2   y3 temp sex
## 1 18.15 16.51 0.24    4   F
## 2 19.15 19.49 0.16    4   F
## 3 18.68 19.50 0.32    4   F
## 4 18.35 19.81 0.17    4   M
## 5 19.54 19.84 0.20    4   M
## 6 20.58 19.44 0.22    4   M
```

#### Checando homocedasticidad

``` r
library(car)
leveneTest(ratas$y1~ratas$sex)
```

```
## Levene's Test for Homogeneity of Variance (center = median)
##       Df F value Pr(&gt;F)
## group  1  0.7524 0.3985
