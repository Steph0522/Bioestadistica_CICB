``` r

#### MANOVA en R

En un experimento para inhibir un tumor, se quiere investigar el efecto del sexo (S) y de la temperatura ambiental (T).


``` r
pesos &lt;-c (18.15,16.51, 0.24, 19.15, 19.49, 0.16, 18.68,
      19.50, 0.32, 18.35, 19.81, 0.17, 19.54, 19.84,
      0.20, 20.58, 19.44, 0.22,21.27, 23.30, 0.33, 
      18.87, 22.00, 0.25, 19.57, 22.30, 0.45, 20.66,
      21.08, 0.20, 20.15, 18.95, 0.35, 21.56, 20.34, 
      0.20,20.74, 16.69, 0.31, 20.22, 19.00, 0.18, 
      20.02, 19.26, 0.41, 18.38, 17.92, 0.30, 17.20,
      15.90, 0.28, 20.85, 19.90, 0.17)
y1&lt;-pesos[c(T,F,F)]
y2&lt;-pesos[c(F,T,F)]
y3&lt;-pesos[c(F,F,T)]
temp &lt;-factor(c(rep(4,6),rep(20,6),rep(34,6)))
sex&lt;-factor(rep(c(rep("F",3),rep("M",3)),3))
ratas&lt;-data.frame(y1,y2,y3,temp,sex)

## perMANOVA en R

``` r

## Ejercicios ANOVA

Se evaluó el efecto de tres tratamientos (fertilizantes) sobre el crecimiento de plantas (cm).


``` r
grupo &lt;- factor(rep(c("Control","A","B"), each = 3))
crecimiento &lt;- c(10,11,12,13,14,15,16,17,18)

data &lt;- data.frame(grupo, crecimiento)
data
```

```
##     grupo crecimiento
## 1 Control          10
## 2 Control          11
## 3 Control          12
## 4       A          13
## 5       A          14
## 6       A          15
## 7       B          16
## 8       B          17
## 9       B          18
```

1. Identificación del problema

Preguntas:

¿Cuál es la variable independiente (factor)?

¿Cuál es la variable dependiente?

¿Cuántos niveles tiene el factor?


2. Hipótesis

H₀: Todas las medias son iguales

H₁: Al menos una media es diferente

3. Cálculo manual


``` r
#Paso 1: medias por grupo
tapply(data$crecimiento, data$grupo, mean)
```

```
##       A       B Control 
##      14      17      11
```

``` r
#Paso 2: media global
mean(data$crecimiento)
```

```
## [1] 14
```

``` r
#Paso 3: Suma de cuadrados total (SCT)
SCT &lt;- sum((data$crecimiento - mean(data$crecimiento))^2)
SCT
```

```
## [1] 60
```

``` r
#Paso 4: Suma de cuadrados entre grupos (SCE)
medias &lt;- tapply(data$crecimiento, data$grupo, mean)
ni &lt;- table(data$grupo)

SCE &lt;- sum(ni * (medias - mean(data$crecimiento))^2)
SCE
```

```
## [1] 54
```

``` r
#Paso 5: Suma de cuadrados dentro de grupos (SCI)
SCI &lt;- SCT - SCE
SCI
```

```
## [1] 6
```

``` r
#Paso 6: Grados de libertad
N = 9 
k=3
N-1 #total 
```

```
## [1] 8
```

``` r
k-1 #entre
```

```
## [1] 2
```

``` r
N-k #dentro
```

```
## [1] 6
```

``` r
#Paso 7: Cuadrados medios
CM_entre &lt;- SCE / 2
CM_dentro &lt;- SCI / 6

CM_entre
```

```
## [1] 27
```

``` r
CM_dentro
```

```
## [1] 1
```

``` r
#Paso 8: Estadístico F
F_value &lt;- CM_entre / CM_dentro
F_value
```

```
## [1] 27
```

``` r
modelo &lt;- lm(crecimiento ~ grupo, data = data)
anova(modelo)
```

```
## Analysis of Variance Table
## 
## Response: crecimiento
##           Df Sum Sq Mean Sq F value Pr(&gt;F)    
## grupo      2     54      27      27  0.001 ***
## Residuals  6      6       1                   
## ---
## Signif. codes:  0 '***' 0.001 '**' 0.01 '*' 0.05 '.' 0.1 ' ' 1
```
6. Interpretación

Preguntas:

¿El p-value es menor a 0.05?

¿Se rechaza H₀?

¿El fertilizante tiene efecto?

👉 Escribe tu conclusión:

7. Comparaciones múltiples (post hoc)

``` r
TukeyHSD(aov(modelo))
```

```
##   Tukey multiple comparisons of means
##     95% family-wise confidence level
## 
## Fit: aov(formula = modelo)
## 
## $grupo
##           diff        lwr        upr     p adj
## B-A          3  0.4947644  5.5052356 0.0242291
## Control-A   -3 -5.5052356 -0.4947644 0.0242291
## Control-B   -6 -8.5052356 -3.4947644 0.0007942
```
Preguntas:

¿Qué grupos son diferentes?

¿Cuál tratamiento tiene mayor efecto?

🔹 8. Interpretación biológica

👉 Explica en términos biológicos:

¿Qué fertilizante funciona mejor?

¿Hay diferencias claras entre tratamientos?

🔹 9. Reflexión final

¿Qué pasaría si F ≈ 1?

¿Qué indica una varianza dentro de grupos alta?
